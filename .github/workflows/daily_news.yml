name: Daily News Push

on:
  schedule:
    - cron: '0 0 * * *' # 这里的 0 0 是 UTC 时间，对应北京时间早上 8:00
  workflow_dispatch: # 允许手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Run Script
        env:
          SC_KEY: ${{ secrets.SC_KEY }} # 从 Secrets 读取 Key
        run: python news_push.py